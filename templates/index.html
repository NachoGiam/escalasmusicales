<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fretboard 0–12 (Escalas)</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}?v=14">
</head>

<body>
  <div class="wrap">
    <!-- Título y descripción principal -->
    <h1>Escalas Musicales - Guitarra</h1>
    <p>Click para marcar/desmarcar manual. Selecciona una escala para resaltar automáticamente.</p>

    <div class="main-layout">
      <div class="content">
        <!-- Área del Diapasón -->
        <div class="board">
          <div class="scrollArea">
            <div class="fretboard-container">
              <div id="grid" class="grid" aria-label="Fretboard"></div>
              <div id="inlays" class="inlays-layer"></div>
              <div id="strings" class="strings-layer"></div>
            </div>
            <div id="markers" class="markers" aria-label="Marcadores de traste"></div>
          </div>
        </div>
        <!-- Barra de herramientas con selectores y controles -->
        <div class="toolbar">
          <!-- selector de tónica -->
          <label class="hint" for="rootSelect">Tónica:</label>
          <select id="rootSelect" aria-label="Seleccionar tónica"></select>
          <label class="hint" for="shapeSelect">Dibujo:</label>
          <select id="shapeSelect"></select>
          <!-- selector modo -->
          <label class="hint" for="scaleSelect">Modo:</label>
          <select id="scaleSelect" aria-label="Seleccionar modo">
            <option value="">-- Ninguno --</option>
            <option value="major">Mayor (Jónico)</option>
            <option value="dorian">Dórico</option>
            <option value="phrygian">Frigio</option>
            <option value="lydian">Lidio</option>
            <option value="mixolydian">Mixolidio</option>
            <option value="minor">Menor (Eólico)</option>
            <option value="locrian">Locrio</option>
          </select>
          <span class="spacer"></span>
          <!-- METRÓNOMO -->
          <div id="metroVisual" class="metro-led" title="Indicador visual de pulso"></div>
          <button id="metroToggle">▶️ Metrónomo</button>
          <label class="hint">BPM</label>
          <input id="bpmInput" type="number" min="40" max="240" value="80" style="width:70px">
          <label class="hint">
            <input type="checkbox" id="metroSound" checked>
            Sonido
          </label>
          <span class="spacer"></span>
          <button id="practiceBtn" type="button" style="border-color: var(--muted)">🎓 Practicar Escala</button>
          <button id="clearBtn" type="button">Limpiar marcas</button>
        </div>
        <div style="margin-top: 10px; opacity: 0.6; font-size: 0.8rem; text-align: center;">
          Tip: elegí escala + tónica (ej: Mayor + C) y se marcan todas las notas.
        </div>
      </div>

      <!-- Panel de Acordes Diatónicos -->
      <aside id="chords-sidebar">
        <div class="sidebar-header">
          <h2>Acordes</h2>
          <div class="toggle-container">
            <label>
              <input type="checkbox" id="chordTypeToggle"> 7th
            </label>
          </div>
        </div>
        <div id="chords-list" class="chords-list">
          <!-- Los acordes se renderizarán aquí -->
          <div class="no-selection">...</div>
        </div>
      </aside>

      <!-- Pop-up Flotante de Acordes -->
      <div id="chord-popup" class="chord-popup">
        <div class="popup-content">
          <div class="popup-header">
            <span id="popup-chord-name" class="chord-name"></span>
            <span id="popup-chord-degree" class="chord-degree"></span>
          </div>
          <div id="popup-diagram-container"></div>
          <div class="card-controls">
            <button id="popup-prev" class="card-btn">←</button>
            <span id="popup-var-label" style="font-size: 0.7rem; color: var(--muted)">Var. 1</span>
            <button id="popup-next" class="card-btn">→</button>
          </div>
        </div>
        <div class="popup-arrow"></div>
      </div>
    </div>
  </div>
  </div>
  <!-- Botón Cafecito Circular con Icono SVG -->
  <button id="cafecitoBtn" class="cafecito-btn" title="Donar en Cafecito">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
      <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
      <line x1="6" y1="1" x2="6" y2="4"></line>
      <line x1="10" y1="1" x2="10" y2="4"></line>
      <line x1="14" y1="1" x2="14" y2="4"></line>
    </svg>
  </button>

  <!-- Modal Cafecito -->
  <div id="cafecitoModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <img src="{{ url_for('static', filename='img/cafecito_ant.png') }}" alt="Hormiguita" class="cafecito-img" />
      <p class="cafecito-phrase">Ayuda a este humilde servidor por amor a la música</p>
      <a href="https://cafecito.app/nachogiam" target="_blank" class="cafecito-link">Ir a Cafecito</a>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}?v=14"></script>
</body>

</html>
